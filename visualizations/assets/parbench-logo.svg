<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="ParBench logo">
  <title>ParBench</title>

  <!-- Background: subtle dark circle for context at small sizes (optional, transparent) -->

  <!-- Outer arc ring: full semicircle, bottom-open, representing the gauge scale -->
  <!-- Arc from 210° to 330° (leaves a 120° gap at bottom) — like a real gauge -->
  <!-- Center: 24,28  Radius: 17  stroke-width: 3 -->
  <!-- 210° point: (24 + 17*cos(210°), 28 + 17*sin(210°)) = (24-14.72, 28+8.5) = (9.28, 36.5) -->
  <!-- 330° point: (24 + 17*cos(330°), 28 + 17*sin(330°)) = (24+14.72, 28+8.5) = (38.72, 36.5) -->
  <!-- Using SVG arc: large-arc-flag=1 because >180° span -->
  <path
    d="M 9.28 36.5 A 17 17 0 1 1 38.72 36.5"
    fill="none"
    stroke="#2563eb"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Tick marks at scale divisions (evenly spaced, 5 ticks across the arc) -->
  <!-- Arc span is 240°, starting at 210°. Ticks at 0%, 25%, 50%, 75%, 100% of arc -->
  <!-- Angles: 210°, 270°, 330° — and intermediate 240°, 300° -->
  <!-- Outer radius 17, inner tick end radius 13.5 -->

  <!-- Tick at 210° (0%) -->
  <line
    x1="9.28" y1="36.5"
    x2="11.41" y2="34.26"
    stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"
  />

  <!-- Tick at 240° (25%) -->
  <!-- (24+17*cos240, 28+17*sin240)=(24-8.5, 28-14.72)=(15.5,13.28) outer -->
  <!-- (24+13.5*cos240, 28+13.5*sin240)=(24-6.75,28-11.69)=(17.25,16.31) inner -->
  <line
    x1="15.5" y1="13.28"
    x2="17.25" y2="16.31"
    stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"
  />

  <!-- Tick at 270° (50%) — top dead center of gauge -->
  <!-- (24+17*cos270, 28+17*sin270)=(24+0, 28-17)=(24,11) outer -->
  <!-- (24+13.5*cos270, 28+13.5*sin270)=(24, 28-13.5)=(24,14.5) inner -->
  <line
    x1="24" y1="11"
    x2="24" y2="14.5"
    stroke="#2563eb" stroke-width="2" stroke-linecap="round"
  />

  <!-- Tick at 300° (75%) -->
  <!-- (24+17*cos300, 28+17*sin300)=(24+8.5, 28-14.72)=(32.5,13.28) outer -->
  <!-- (24+13.5*cos300, 28+13.5*sin300)=(24+6.75,28-11.69)=(30.75,16.31) inner -->
  <line
    x1="32.5" y1="13.28"
    x2="30.75" y2="16.31"
    stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"
  />

  <!-- Tick at 330° (100%) -->
  <line
    x1="38.72" y1="36.5"
    x2="36.59" y2="34.26"
    stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"
  />

  <!-- Needle: pointing at ~75% (300°) — representing a strong benchmark score -->
  <!-- Needle tip at radius 14 along 300°: (24+14*cos300, 28+14*sin300) = (24+7, 28-12.12) = (31, 15.88) -->
  <!-- Needle base: center hub at (24, 28), small offset backward along 120° for tail -->
  <!-- Tail at radius 4 along 120°: (24+4*cos120, 28+4*sin120) = (24-2, 28+3.46) = (22, 31.46) -->
  <line
    x1="22" y1="31.46"
    x2="31" y2="15.88"
    stroke="#f59e0b"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Center hub dot -->
  <circle cx="24" cy="28" r="2.2" fill="#2563eb" />

  <!-- Small inner hub accent ring -->
  <circle cx="24" cy="28" r="1" fill="#f59e0b" />
</svg>
