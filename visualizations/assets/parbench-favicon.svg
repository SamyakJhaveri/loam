<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" role="img" aria-label="ParBench">
  <title>ParBench</title>
  <!-- Scaled-down: center at (8,9.3), radius 5.7, stroke 1.1 -->
  <!-- Arc 210°→330° same proportions -->
  <!-- 210°: (8+5.7*cos210, 9.3+5.7*sin210) = (8-4.94, 9.3+2.85) = (3.06, 12.15) -->
  <!-- 330°: (8+5.7*cos330, 9.3+5.7*sin330) = (8+4.94, 9.3+2.85) = (12.94, 12.15) -->
  <path
    d="M 3.06 12.15 A 5.7 5.7 0 1 1 12.94 12.15"
    fill="none"
    stroke="#2563eb"
    stroke-width="1.1"
    stroke-linecap="round"
  />
  <!-- Needle at 300°: tip radius 4.7 → (8+4.7*cos300, 9.3+4.7*sin300)=(8+2.35, 9.3-4.07)=(10.35, 5.23) -->
  <!-- Tail radius 1.3 at 120°: (8+1.3*cos120, 9.3+1.3*sin120)=(8-0.65, 9.3+1.13)=(7.35,10.43) -->
  <line x1="7.35" y1="10.43" x2="10.35" y2="5.23"
    stroke="#f59e0b" stroke-width="0.9" stroke-linecap="round" />
  <circle cx="8" cy="9.3" r="0.9" fill="#2563eb" />
</svg>
