<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="ParBench logo">
  <title>ParBench</title>

  <!--
    ParBench Logo — Option B: Parallel Lines / Data Flow
    5 horizontal execution lanes, each offset in time (staggered dash),
    converging into a single arrowhead on the right.
    Color: #2563eb with opacity gradient to signal depth/hierarchy.
    Legible at 16×16 (favicon): lanes + arrow remain distinct.
  -->

  <!-- Lane 1 — top, lightest (outermost thread) -->
  <line x1="4"  y1="10" x2="36" y2="10"
        stroke="#2563eb" stroke-width="2.5" stroke-opacity="0.30"
        stroke-linecap="round"/>

  <!-- Lane 2 -->
  <line x1="4"  y1="17" x2="36" y2="17"
        stroke="#2563eb" stroke-width="2.5" stroke-opacity="0.52"
        stroke-linecap="round"/>

  <!-- Lane 3 — center, full opacity (primary / reference thread) -->
  <line x1="4"  y1="24" x2="36" y2="24"
        stroke="#2563eb" stroke-width="3" stroke-opacity="1.00"
        stroke-linecap="round"/>

  <!-- Lane 4 -->
  <line x1="4"  y1="31" x2="36" y2="31"
        stroke="#2563eb" stroke-width="2.5" stroke-opacity="0.52"
        stroke-linecap="round"/>

  <!-- Lane 5 — bottom, lightest (outermost thread) -->
  <line x1="4"  y1="38" x2="36" y2="38"
        stroke="#2563eb" stroke-width="2.5" stroke-opacity="0.30"
        stroke-linecap="round"/>

  <!--
    Arrowhead — all 5 lanes converge to a single point.
    Represents synchronization / reduction after parallel execution.
    Drawn as a filled chevron pointing right.
  -->
  <polyline points="36,8  44,24  36,40"
            fill="none"
            stroke="#2563eb" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
