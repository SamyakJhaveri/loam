_min_copier_version: "9.4.0"
_subdirectory: template
_templates_suffix: .jinja
_envops:
  keep_trailing_newline: true

# Files/patterns to never copy
_exclude:
  - ".DS_Store"
  - "*.pyc"
  - "__pycache__"
  - "*.bak"
  - "seed-folders"

# Questions asked during `copier copy`
project_name:
  type: str
  help: "What is your project name?"
  validator: "{% if not project_name %}Project name is required{% endif %}"

flavors:
  type: str
  help: "Which flavor packs to include?"
  multiselect: true
  choices:
    "Research (experiments, papers, HPC)": research
    "Software Engineering (architecture, frontend)": software-eng
  default:
    - research

github_repo:
  type: str
  help: "GitHub repo (owner/repo) for this project? Leave empty to skip."
  default: ""
  validator: "{% if github_repo and not (github_repo | regex_search('^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$')) %}Invalid repo format — use owner/repo{% endif %}"

# Post-generation tasks (run in the generated project directory)
_tasks:
  # Merge research flavor if selected
  - >-
    {% if 'research' in flavors %}
    echo '[copier] Applying research flavor...' &&
    cp -R _research/agents/* .claude/agents/ 2>/dev/null || true &&
    cp -R _research/skills/* .claude/skills/ 2>/dev/null || true &&
    cp -R _research/hooks/* .claude/hooks/ 2>/dev/null || true &&
    cp -R _research/rules/* .claude/rules/ 2>/dev/null || true &&
    cp _research/docs/* . 2>/dev/null || true &&
    python3 _copier_merge_hooks.py _research/settings-hooks.json .claude/settings.json &&
    rm -r _research &&
    echo '[copier] Research flavor applied.'
    {% endif %}

  # Merge software-eng flavor if selected
  - >-
    {% if 'software-eng' in flavors %}
    echo '[copier] Applying software-eng flavor...' &&
    cp -R _software-eng/rules/* .claude/rules/ 2>/dev/null || true &&
    cp _software-eng/docs/* . 2>/dev/null || true &&
    rm -r _software-eng &&
    echo '[copier] Software-eng flavor applied.'
    {% endif %}

  # Clean up any unselected flavor directories and helper script
  - "rm -r _research _software-eng 2>/dev/null || true"
  - "rm -f _copier_merge_hooks.py"

  # Create seed folders with .gitkeep
  - "for dir in archive config files_from_team internal_docs meeting_notes presentations results scripts submission_artifacts submission_docs; do mkdir -p \"$dir\" && touch \"$dir/.gitkeep\"; done"

  # Initialize git repo (skip on copier update — .git already exists)
  - "if [ ! -d .git ]; then (git init -b main 2>/dev/null || git init) && git add . && git commit -m 'Initial commit from project-seed-framework'; fi"

  # Optional: create GitHub repo
  - >-
    {% if github_repo %}
    if command -v gh >/dev/null 2>&1; then
      gh repo create "{{ github_repo }}" --private --source=. --remote=origin --push ||
        echo '[copier] Warning: gh repo create failed. Add remote manually.'
    else
      echo '[copier] Warning: gh CLI not found. Add GitHub remote manually.'
    fi
    {% endif %}
