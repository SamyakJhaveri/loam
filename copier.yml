_min_copier_version: "9.4.0"
_subdirectory: "."
_templates_suffix: .jinja
_envops:
  keep_trailing_newline: true

# Files/patterns to never copy into rendered projects.
# These are template-author working files, internal references,
# and pollution that should not propagate.
_exclude:
  # Generic VCS / build noise
  - ".DS_Store"
  - "*.pyc"
  - "__pycache__"
  - "*.bak"
  - ".git"

  # Template-author working files (this repo's own dogfooded config
  # has both the working CLAUDE.md/README.md/HANDOFF.md and the
  # .jinja-suffixed versions that ship to projects; only the .jinja
  # versions should propagate).
  - "TEMPLATE-CLAUDE.md"
  - "TEMPLATE-README.md"
  - "TEMPLATE-HANDOFF.md"
  - "V2.0-HANDOFF-SUMMARY.md"
  - ".claudeignore"
  - "template-manifest.schema.json"
  - ".github"
  - ".gitignore"

  # Internal-only references and pollution
  - "claude_code_course_files"
  - "internal_docs"
  - "outputs"
  - "IMG_*"
  - ".claude/audit.log"
  - ".claude/.local-paths"
  - ".claude/settings.local.json"
  - ".claude/worktrees"

  # Framework machinery — do not ship to rendered projects
  - "bin"
  - "docs"
  - "copier.yml"
  - "VERSION"
  - "LICENSE"
  - "seed-skills"

# Questions asked during `copier copy`
project_name:
  type: str
  help: "What is your project name?"
  validator: "{% if not project_name %}Project name is required{% endif %}"

is_research:
  type: bool
  help: "Include the research flavor (papers, experiments, HPC, citation-audit, paper-write, etc.)?"
  default: false

github_repo:
  type: str
  help: "GitHub repo (owner/repo) for this project? Leave empty to skip."
  default: ""
  validator: "{% if github_repo and not (github_repo | regex_search('^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$')) %}Invalid repo format — use owner/repo{% endif %}"

# Post-generation tasks (run in the generated project directory)
_tasks:
  # Apply research flavor if selected
  - >-
    {% if is_research %}
    echo '[copier] Applying research flavor...' &&
    cp -R _research/agents/* .claude/agents/ 2>/dev/null || true &&
    cp -R _research/skills/* .claude/skills/ 2>/dev/null || true &&
    cp -R _research/hooks/* .claude/hooks/ 2>/dev/null || true &&
    cp -R _research/rules/* .claude/rules/ 2>/dev/null || true &&
    cp _research/seed-docs/* . 2>/dev/null || true &&
    python3 _copier_merge_hooks.py _research/settings-hooks.json .claude/settings.json 2>/dev/null || true &&
    rm -r _research &&
    echo '[copier] Research flavor applied.'
    {% endif %}

  # Always remove the research flavor overlay and helper script after render
  - "rm -r _research 2>/dev/null || true"
  - "rm -f _copier_merge_hooks.py"

  # Create seed working directories with .gitkeep
  - "for dir in archive config files_from_team internal_docs meeting_notes presentations results scripts submission_artifacts submission_docs; do mkdir -p \"$dir\" && touch \"$dir/.gitkeep\"; done"

  # Initialize git repo (skip on copier update — .git already exists)
  - "if [ ! -d .git ]; then (git init -b main 2>/dev/null || git init) && git add . && git commit -m 'Initial commit from loam'; fi"

  # Optional: create GitHub repo
  - >-
    {% if github_repo %}
    if command -v gh >/dev/null 2>&1; then
      gh repo create "{{ github_repo }}" --private --source=. --remote=origin --push ||
        echo '[copier] Warning: gh repo create failed. Add remote manually.'
    else
      echo '[copier] Warning: gh CLI not found. Add GitHub remote manually.'
    fi
    {% endif %}
