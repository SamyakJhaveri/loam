# Memsearch — persistent semantic session memory
# Automatically captures session decisions and enables recall across sessions.
# Docs: https://github.com/zilliztech/memsearch
#
# How it works:
#   - After each Claude response, a Haiku summary is appended to .memsearch/memory/YYYY-MM-DD.md
#   - At session start, recent memories are injected as context
#   - /memory-recall runs semantic search when historical context would help
#
# Storage: human-readable Markdown in .memsearch/memory/ + local Milvus vector DB
# Cost: free for embeddings (ONNX runs locally). Summarization uses Haiku via your Claude CLI.

[embedding]
provider = "onnx"  # Local embeddings, no API key needed (bge-m3, ~558MB one-time download)

[milvus]
uri = ".memsearch/milvus.db"  # Per-project vector store (Milvus Lite)

[chunking]
max_chunk_size = 1500
overlap_lines = 2
