<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="ParBench logo — benchmark results matrix">
  <title>ParBench</title>
  <!--
    Results Matrix Mark — Option E
    4 rows × 3 cols grid, cell 10×10, gap 2px
    Grid width:  3×10 + 2×2 = 34px  → left offset = (48-34)/2 = 7
    Grid height: 4×10 + 3×2 = 46px  → top  offset = (48-46)/2 = 1

    Cell fill pattern (PASS = sky-blue #56B4E9, FAIL = light-gray #e5e7eb):
      Row 0: ■ ■ ■   (top bar of P)
      Row 1: ■ □ ■   (sides of P bowl; interior open)
      Row 2: ■ ■ ■   (middle crossbar sealing the bowl)
      Row 3: ■ □ □   (stem / tail of P)

    9 filled / 12 total = 75% pass rate — conveys strong but not perfect results.
    The three empty cells (□) are the "failure" minority and remain visually prominent.
  -->

  <!-- Background (optional — transparent by default, shown here for reference) -->
  <!-- <rect width="48" height="48" fill="#ffffff"/> -->

  <!-- Row 0 — top bar of P -->
  <rect x="7"  y="1"  width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="1"  width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="31" y="1"  width="10" height="10" rx="1.5" fill="#56B4E9"/>

  <!-- Row 1 — sides of P bowl (interior cell is empty/fail) -->
  <rect x="7"  y="13" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="13" width="10" height="10" rx="1.5" fill="#e5e7eb"/>
  <rect x="31" y="13" width="10" height="10" rx="1.5" fill="#56B4E9"/>

  <!-- Row 2 — middle crossbar -->
  <rect x="7"  y="25" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="25" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="31" y="25" width="10" height="10" rx="1.5" fill="#56B4E9"/>

  <!-- Row 3 — tail / stem of P -->
  <rect x="7"  y="37" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="37" width="10" height="10" rx="1.5" fill="#e5e7eb"/>
  <rect x="31" y="37" width="10" height="10" rx="1.5" fill="#e5e7eb"/>

</svg>
