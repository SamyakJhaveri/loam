<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="ParBench logo — benchmark results matrix, dark variant">
  <title>ParBench (dark)</title>
  <!--
    Dark-background variant — for slides, READMEs with dark themes, or terminal contexts.

    Background: #1e1e2e (deep slate, works on projector slides)
    PASS cells:  #56B4E9  (same Okabe-Ito sky blue — unchanged for colorblind safety)
    FAIL cells:  #3b3b52  (muted dark-purple-gray — visible against the background
                           but clearly distinct from PASS; not stark white to avoid
                           drawing equal visual weight to failures)

    Same P-shaped 9/12 fill pattern as the light variant.
  -->

  <!-- Dark background panel (rounded rect so it can be used as a standalone badge) -->
  <rect width="48" height="48" rx="6" fill="#1e1e2e"/>

  <!-- Row 0 — top bar of P -->
  <rect x="7"  y="1"  width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="1"  width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="31" y="1"  width="10" height="10" rx="1.5" fill="#56B4E9"/>

  <!-- Row 1 — sides of P bowl -->
  <rect x="7"  y="13" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="13" width="10" height="10" rx="1.5" fill="#3b3b52"/>
  <rect x="31" y="13" width="10" height="10" rx="1.5" fill="#56B4E9"/>

  <!-- Row 2 — middle crossbar -->
  <rect x="7"  y="25" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="25" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="31" y="25" width="10" height="10" rx="1.5" fill="#56B4E9"/>

  <!-- Row 3 — tail / stem of P -->
  <rect x="7"  y="37" width="10" height="10" rx="1.5" fill="#56B4E9"/>
  <rect x="19" y="37" width="10" height="10" rx="1.5" fill="#3b3b52"/>
  <rect x="31" y="37" width="10" height="10" rx="1.5" fill="#3b3b52"/>

</svg>
