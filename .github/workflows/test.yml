name: Test

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Copier
        run: pip install copier

      - name: Configure Git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@loam"

      - name: Verify template
        run: bin/verify-template.sh
