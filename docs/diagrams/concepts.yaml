  label_strategy: vector-overlay
  palette: "clear routing key — bright indigo, pale sky blue, and warm cream"
  track_b:
    prompt: "A luminous cutaway garden arranged like a routing diagram. At the left a single clear glass-walled dispatch basin gathers bright water and feeds three separate irrigation channels that split apart — one rising upward, one running straight across, and one descending — each carved with directional ripple marks in its direction of travel and ending in its own bright endpoint pool set in a distinct horizontal bed at a different depth, three layers in all. The three channels stay clearly separate so each layer is fed on its own line; beyond the beds a calm lake and soft layered hills rest under a fresh bright sky"
