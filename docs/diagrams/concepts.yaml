- id: 4
  slug: layer-triage
  name: "Layer triage (60/30/10)"
  viewer_should_understand: "A viewer should understand that most work belongs to deterministic tools, less to rule-based systems, and only a small share to probabilistic reasoning."
  must_show:
    - "three unequal proportions"
    - "the 60 percent, 30 percent, and 10 percent relationship"
    - "clear separation between deterministic, rule-based, and probabilistic work"
  label_strategy: track-a
  palette: "luminous garden key — fresh sap green, warm earth-brown, and glowing gold"
  track_b:
    prompt: "An extreme up-close, frame-filling botanical cross-section of a plant's vascular system, drawn with the clarity of a textbook xylem-and-phloem transport diagram — distinct bundles of many fine parallel vessel-tubes running through living green tissue, each tube carrying glowing golden sap with small directional flow-marks showing the material moving along it. The vessel-tubes are gathered into three clearly unequal bundle-clusters: by far the largest central cluster — roughly six parts in ten of all the vessels — forms the thick sturdy structural core that carries the bulk of the flow; a clearly smaller cluster — roughly three parts in ten — runs to one side; and only a tiny cluster of a few fine vessels — roughly one part in ten — climbs to feed a single small bright glowing bud at the growing tip. The three clusters read as plainly unequal in size — central core largest, side cluster medium, bud cluster a mere few vessels — so the six-three-one apportioning of the vessels and their flow reads at a glance. Clean botanical-illustration clarity, the magnified tissue fresh and luminous in sap green, warm tissue-brown, and glowing gold, filling the entire frame with no empty background"
    refs:
      - "Cryptomeria_Avenue_by_Yoshida_Hiroshi,_woodblock_print,_Honolulu_Museum_of_Art.jpg"
      - "Bamboo Grove, by Yoshida Hiroshi, 1939.jpg"
  track_a:
    source_context: "A proportion chart of the 60/30/10 layer split: deterministic 60% (functions, scripts, validators), rule-based 30% (skills, hooks, configured workflows), probabilistic 10% (open-ended LLM reasoning). Labels with percentages: 'deterministic 60%', 'rule-based 30%', 'probabilistic 10%'. This is the REAL proof render — a matplotlib proportion chart via PaperBanana."
    figure_caption: "Roughly 60% of work is deterministic, 30% rule-based, and only 10% needs probabilistic reasoning."
    visual_intent: "Academic proportion chart (stacked bar or three-segment split); each segment labeled with its name and percentage; matplotlib-clean styling."
  # Track B reframed (2026-06-03): up-close xylem/phloem cross-section (NOT the atmospheric hero) — golden sap in three unequal vessel-clusters (~6/3/1). See design-philosophy.md §6.
  status: { track_a: todo, track_b: keep }

