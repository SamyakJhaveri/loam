- id: 3
  slug: context-routing
  name: "Context routing (L0/L1/L2)"
  palette: "blueprint mono — indigo on cream"
  track_b:
    prompt: "Three stacked horizontal strata of soil seen in cross-section, each layer a distinct depth, with a single circular gate ring set into the ground where the layers meet, sunlight catching the rim of the ring"
    refs:
      - "Lake_Kawaguchi_by_Yoshida_Hiroshi,_1926,_woodblock_print,_Honolulu_Museum_of_Art.jpg"
      - "Morning_Mist_in_Taj_Mahal,_no._5,_Hiroshi_yoshida.jpg"
      - "Cryptomeria_Avenue_by_Yoshida_Hiroshi,_woodblock_print,_Honolulu_Museum_of_Art.jpg"
      - "Yōmeimon,_Hiroshi_Yoshida,_陽明門,_吉田博.jpg"
  track_a:
    source_context: "The three context-load layers with their token budgets: L0 = CLAUDE.md (~800 tokens, always loaded, 'where am I'); L1 = CONTEXT.md (~300 tokens, on entry to a subdir, 'where do I go'); L2 = stage contract (200-500 tokens, per task, 'what do I do'). Labels: 'L0 CLAUDE.md ~800', 'L1 CONTEXT.md ~300', 'L2 stage contract 200-500'."
    figure_caption: "Context routes through three layers, each loaded at a different time with its own token budget."
    visual_intent: "Academic stacked-layer diagram; three bands top to bottom; on-figure labels kept to 2-3 words plus the budget number each."
  status: { track_a: todo, track_b: rendered }

- id: 4
  slug: layer-triage
  name: "Layer triage (60/30/10)"
  palette: "earth tones — ochre, umber, sienna"
  track_b:
    prompt: "A vertical cross-section of a plant's root mass spreading through three unequal zones of earth, the topmost zone densely packed with the bulk of the roots, the middle zone moderately filled, the deepest zone holding only a few fine taproots"
    refs:
      - "Cryptomeria_Avenue_by_Yoshida_Hiroshi,_woodblock_print,_Honolulu_Museum_of_Art.jpg"
      - "Bamboo Grove, by Yoshida Hiroshi, 1939.jpg"
  track_a:
    source_context: "A proportion chart of the 60/30/10 layer split: deterministic 60% (functions, scripts, validators), rule-based 30% (skills, hooks, configured workflows), probabilistic 10% (open-ended LLM reasoning). Labels with percentages: 'deterministic 60%', 'rule-based 30%', 'probabilistic 10%'. This is the REAL proof render — a matplotlib proportion chart via PaperBanana."
    figure_caption: "Roughly 60% of work is deterministic, 30% rule-based, and only 10% needs probabilistic reasoning."
    visual_intent: "Academic proportion chart (stacked bar or three-segment split); each segment labeled with its name and percentage; matplotlib-clean styling."
  status: { track_a: todo, track_b: todo }

